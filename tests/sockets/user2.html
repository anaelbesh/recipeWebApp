<!DOCTYPE html>
<html>
<head>
    <title>Chat Test - node03</title>
    <style>
        #chat-box { width: 400px; height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 10px; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 5px; border-radius: 5px; background: #f1f1f1; width: fit-content; }
        .own { background: #dcf8c6; align-self: flex-end; }
    </style>
</head>
<body>
<h3>Chat Test (Dor)</h3>
<div id="chat-box"></div>
<input type="text" id="msg-input" placeholder="Type a message...">
<button onclick="send()">Send</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // const SERVER_URL = "http://node03.cs.colman.ac.il:4000";
    const SERVER_URL = "http://localhost:4000";
    const MY_ID = "user_2";
    const PARTNER_ID = "user_1";

    const socket = io(SERVER_URL);
    const chatBox = document.getElementById('chat-box');

    // 1. Function to display a message in the UI
    function appendMessage(data, tempId) {
        const div = document.createElement('div');
        div.className = 'msg' + (data.senderId === MY_ID ? ' own' : '');
        // Use permanent ID if available, otherwise use tempId
        const finalId = data._id || tempId;
        div.id = finalId;

        div.innerHTML = `${data.message} <small class="status"></small>`;
        chatBox.appendChild(div);
    }

    async function loadHistory() {
        try {
            // Remove the ?userId=${MY_ID} part after we have JWT Support
            const response = await fetch(`${SERVER_URL}/api/chat/history/${PARTNER_ID}?userId=${MY_ID}`);
            const history = await response.json();

            chatBox.innerHTML = '';

            history.forEach(msg => {
                // Add to the chat
                appendMessage(msg);

                // Update msgs status
                const msgElement = document.getElementById(msg._id);
                if (msgElement && msg.senderId === MY_ID) {
                    const statusElement = msgElement.querySelector('.status');
                    if (msg.isRead) {
                        statusElement.innerText = "Read";
                        statusElement.style.color = "blue";
                    } else {
                        statusElement.innerText = "Delivered";
                        statusElement.style.color = "gray";
                    }
                }

                // If we have messages i got and they dont marked as "read" for multiple reasons
                // // i was offline when i got this message for example - i will do it now.
                if (msg.receiverId === MY_ID && !msg.isRead) {
                    socket.emit("mark_as_read", {
                        messageId: msg._id,
                        senderId: msg.senderId
                    });
                }
            });
        } catch (err) {
            console.error("Failed to load history:", err);
        }
    }

    // 3. SOCKET LOGIC
    socket.on("connect", () => {
        console.log("Connected to Socket!");
        socket.emit("join", MY_ID);
        loadHistory(); // Load old messages as soon as we connect
    });

    socket.on("receive_message", (data) => {
        appendMessage(data);

        // Tell the server we rade this message
        socket.emit("mark_as_read", {
            messageId: data._id,
            senderId: data.senderId
        });
    });

    socket.on("message_read_update", (ack) => {
        const msgElement = document.getElementById(ack.messageId);
        if (msgElement) {
            const statusElement = msgElement.querySelector('.status');
            statusElement.innerText = " Read"; // Double checkmark style
            statusElement.style.color = "lightskyblue";
        }
    });

    function send() {
        const input = document.getElementById('msg-input');
        const tempId = Date.now().toString();

        const data = {
            tempId: tempId,
            senderId: MY_ID,
            receiverId: PARTNER_ID,
            message: input.value
        };

        appendMessage(data, tempId);

        socket.emit("send_message", data);
        input.value = '';
    }

    socket.on("message_received_ack", (ack) => {
        const msgElement = document.getElementById(ack.tempId);
        if (msgElement) {
            // Change the ID from temp to permanent so we can find it later for the "Read" update
            msgElement.id = ack.permanentId;

            const statusElement = msgElement.querySelector('.status');
            statusElement.innerText = " Delivered";
            statusElement.style.color = "gray";
        }
    });

</script>
</body>
</html>
