<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat Test - node03</title>
    <style>
        #chat-box { width: 400px; height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 10px; display: flex; flex-direction: column; font-family: sans-serif; }
        .msg { margin: 5px; padding: 8px; border-radius: 8px; background: #f1f1f1; width: fit-content; max-width: 80%; position: relative; }
        .own { background: #dcf8c6; align-self: flex-end; }

        /* New styles for time and status */
        .msg-content { display: block; margin-bottom: 4px; }
        .msg-footer { display: flex; justify-content: flex-end; align-items: center; font-size: 10px; color: #888; gap: 5px; }
        .time { font-style: italic; }
        .status { font-weight: bold; }
    </style>
</head>
<body>
<h3>Chat Test (Dor)</h3>
<div id="chat-box"></div>
<input type="text" id="msg-input" placeholder="Type a message...">
<button onclick="send()">Send</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    // const SERVER_URL = "http://node03.cs.colman.ac.il:4000";
    const SERVER_URL = "http://localhost:4000";
    const MY_ID = "user_2";
    const PARTNER_ID = "user_1";

    const socket = io(SERVER_URL);
    const chatBox = document.getElementById("chat-box");

    // Helper to format time as HH:MM
    function formatTime(timestamp) {
        const date = timestamp ? new Date(timestamp) : new Date();
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // 1. Updated Function to display a message with time
    function appendMessage(data, tempId) {
        const div = document.createElement("div");
        div.className = "msg" + (data.senderId === MY_ID ? " own" : "");

        const finalId = data._id || tempId;
        div.id = finalId;

        // Use createdAt from DB, or current time for new outgoing messages
        const timeStr = formatTime(data.createdAt);

        div.innerHTML = `
            <span class="msg-content">${data.message}</span>
            <div class="msg-footer">
                <span class="time">${timeStr}</span>
                <small class="status"></small>
            </div>
        `;

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }

    async function loadHistory() {
        try {
            const response = await fetch(`${SERVER_URL}/api/chat/history/${PARTNER_ID}?userId=${MY_ID}`);
            const history = await response.json();

            chatBox.innerHTML = "";
            history.forEach(msg => {
                appendMessage(msg);

                const msgElement = document.getElementById(msg._id);
                if (msgElement && msg.senderId === MY_ID) {
                    const statusElement = msgElement.querySelector(".status");
                    if (msg.isRead) {
                        statusElement.innerText = "Message read";
                        statusElement.style.color = "blue";
                    } else {
                        statusElement.innerText = "Message received";
                        statusElement.style.color = "gray";
                    }
                }

                if (msg.receiverId === MY_ID && !msg.isRead) {
                    socket.emit("mark_as_read", {
                        messageId: msg._id,
                        senderId: msg.senderId
                    });
                }
            });
        } catch (err) {
            console.error("Failed to load history:", err);
        }
    }

    socket.on("connect", () => {
        socket.emit("join", MY_ID);
        loadHistory();
    });

    socket.on("receive_message", (data) => {
        appendMessage(data);
        socket.emit("mark_as_read", {
            messageId: data._id,
            senderId: data.senderId
        });
    });

    socket.on("message_read_update", (ack) => {
        const msgElement = document.getElementById(ack.messageId);
        if (msgElement) {
            const statusElement = msgElement.querySelector(".status");
            statusElement.innerText = "Message read";
            statusElement.style.color = "lightskyblue";
        }
    });

    function send() {
        const input = document.getElementById("msg-input");
        if (!input.value.trim()) return;

        const tempId = Date.now().toString();
        const data = {
            tempId: tempId,
            senderId: MY_ID,
            receiverId: PARTNER_ID,
            message: input.value,
            createdAt: new Date().toISOString() // Add local time for immediate display
        };

        appendMessage(data, tempId);
        socket.emit("send_message", data);
        input.value = "";
    }

    socket.on("message_received_ack", (ack) => {
        const msgElement = document.getElementById(ack.tempId);
        if (msgElement) {
            msgElement.id = ack.permanentId;
            const statusElement = msgElement.querySelector(".status");
            statusElement.innerText = "✓";
            statusElement.style.color = "gray";
        }
    });

</script>
</body>
</html>
